<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/kaochu18/favicon.ico" type="image/x-icon">
    <title>永遠18歲的媽媽/阿嬤/阿祖</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background: #fdf5f6;
            padding: 0;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* --- Petals (subtle) --- */
        .petal {
            position: fixed;
            border-radius: 50% 0 50% 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
        }
        @keyframes fall {
            0%   { opacity: 0;   transform: translateY(-6vh)  rotate(0deg); }
            6%   { opacity: 0.7; }
            94%  { opacity: 0.4; }
            100% { opacity: 0;   transform: translateY(108vh) rotate(var(--rot)) translateX(var(--drift)); }
        }

        /* --- Sticky month nav --- */
        .month-nav-sticky {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(253, 245, 246, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid #f0d8dc;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .back-btn {
            display: inline-block;
            padding: 6px 14px;
            background: #c87888;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .back-btn:hover { background: #b06070; }
        .nav-divider {
            width: 1px;
            height: 20px;
            background: #e0c0c8;
            flex-shrink: 0;
        }
        .month-jump-btn {
            padding: 6px 14px;
            background: #f9f0f2;
            border: 1px solid #eedde4;
            border-radius: 20px;
            color: #8a6070;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .month-jump-btn:hover {
            background: #c87888;
            color: white;
            border-color: #c87888;
        }
        .month-jump-btn.final {
            background: #fef9ee;
            border-color: #e8cc80;
            color: #8a6820;
        }
        .month-jump-btn.final:hover {
            background: #c8a050;
            border-color: #c8a050;
            color: white;
        }

        /* --- Page header --- */
        .page-header {
            text-align: center;
            padding: 28px 20px 10px;
            position: relative;
            z-index: 1;
        }
        .page-header h1 {
            color: #5a3848;
            margin: 0 0 4px;
            letter-spacing: 2px;
            font-size: 26px;
        }
        .page-header .subtitle {
            color: #a07888;
            font-size: 14px;
            margin: 0;
        }

        /* --- Content --- */
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* --- Month section --- */
        .month-section {
            margin-bottom: 48px;
            scroll-margin-top: 60px;
        }
        .month-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .month-header-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, #e0b0b8, transparent);
        }
        .month-header-title {
            font-size: 22px;
            font-weight: 700;
            color: #5a3848;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        /* --- Calendar --- */
        .month {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 16px rgba(170, 110, 130, 0.1);
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 14px;
            color: #b09898;
            margin-bottom: 5px;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .day {
            min-height: 180px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 16px;
            border-radius: 6px;
            background: #fdfafa;
        }
        .day.empty { background: transparent; }
        .day.weekend { background: #fef5f0; }
        .day.holiday { background: #fef5f0; }
        .day .date-num {
            font-weight: bold;
            margin-bottom: 2px;
            color: #5a3848;
        }
        .day .holiday-name {
            font-size: 12px;
            color: #c07040;
            font-weight: bold;
        }
        .day .visitors {
            font-size: 13px;
            color: #666;
            text-align: center;
            line-height: 1.3;
            word-break: break-all;
        }
        .day .visitors .morning,
        .day .visitors .afternoon { color: #1565c0; }
        .day .note {
            font-size: 12px;
            color: #9060a8;
            font-style: italic;
            position: relative;
            cursor: pointer;
        }
        .day .note:hover::after {
            content: attr(data-full);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 100%;
            background: #5a3848;
            color: white;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-style: normal;
            white-space: pre-wrap;
            width: 250px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .day .photos {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .day .photos img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .day .photos img:hover { transform: scale(1.05); }

        /* --- 5/3 final day --- */
        .day.day-final {
            background: linear-gradient(135deg, #fffdf0, #fef8e2);
            box-shadow: 0 0 0 1px rgba(210, 170, 80, 0.4),
                        0 0 18px rgba(210, 170, 80, 0.18);
            position: relative;
        }
        .day.day-final .date-num { color: #8a6820; }
        .day.day-final::after {
            content: '✿';
            position: absolute;
            top: 5px; right: 7px;
            font-size: 13px;
            color: #c8a050;
            opacity: 0.75;
            pointer-events: none;
        }

        /* --- Post-5/3 ceremony days --- */
        .day.day-ceremony {
            background: #fdf8ee;
            border: 1px solid rgba(210, 180, 100, 0.25);
        }
        .day.day-ceremony .date-num { color: #8a6820; }
        .day.day-ceremony .visitors .morning,
        .day.day-ceremony .visitors .afternoon { color: #a07828; }
        .day.day-ceremony .note { color: #a07828; }

        /* --- Days after 5/3 with no data --- */
        .day.day-after { background: transparent; }
        .day.day-after .date-num { color: #ddd; font-weight: normal; }

        /* --- Misc --- */
        .loading { text-align: center; padding: 50px; font-size: 18px; color: #a07888; }

        /* Photo hover preview */
        .photo-hover-preview {
            display: none;
            position: fixed;
            z-index: 500;
            background: white;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            pointer-events: none;
        }
        .photo-hover-preview img {
            max-width: 400px;
            max-height: 400px;
            border-radius: 4px;
        }

        /* Photo modal */
        .photo-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.88);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .photo-modal.active { display: flex; }
        .photo-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }
        .photo-modal .close-btn {
            position: absolute; top: 20px; right: 20px;
            color: white; font-size: 36px; cursor: pointer;
        }
        .photo-modal .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            font-size: 40px; color: white; cursor: pointer;
            padding: 20px; user-select: none; opacity: 0.7;
        }
        .photo-modal .nav-btn:hover { opacity: 1; }
        .photo-modal .nav-btn.prev { left: 10px; }
        .photo-modal .nav-btn.next { right: 10px; }
        .photo-modal .nav-btn.hidden { display: none; }
        .photo-modal .photo-counter {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            color: white; font-size: 14px;
        }

        /* Text modal */
        .text-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.88);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .text-modal.active { display: flex; }
        .text-modal .close-btn {
            position: absolute; top: 20px; right: 20px;
            color: white; font-size: 36px; cursor: pointer;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .page-header { padding: 18px 16px 8px; }
            .page-header h1 { font-size: 20px; }
            .content { padding: 12px 10px 40px; }
            .month { padding: 10px; }
            .weekdays { font-size: 12px; }
            .days { gap: 1px; }
            .day { min-height: 100px; padding: 4px; font-size: 12px; }
            .day .date-num { font-size: 13px; }
            .day .visitors { font-size: 10px; }
            .day .holiday-name { font-size: 10px; }
            .day .note { font-size: 10px; }
            .day .photos img { width: 35px; height: 35px; }
            .photo-hover-preview { display: none !important; }
            .day .note:hover::after { display: none !important; }
            .day.day-final::after { font-size: 11px; }
            .month-jump-btn { font-size: 12px; padding: 5px 10px; }
        }
        @media (max-width: 480px) {
            .day { min-height: 80px; padding: 2px; }
            .day .date-num { font-size: 12px; }
            .day .visitors { font-size: 9px; }
            .day .photos img { width: 28px; height: 28px; }
        }
    </style>
</head>
<body>

    <nav class="month-nav-sticky">
        <a href="index.html" class="back-btn">&larr; 返回</a>
        <div class="nav-divider"></div>
        <a href="#month-01" class="month-jump-btn">1月</a>
        <a href="#month-02" class="month-jump-btn">2月</a>
        <a href="#month-03" class="month-jump-btn">3月</a>
        <a href="#month-04" class="month-jump-btn">4月</a>
        <a href="#month-05" class="month-jump-btn final">5月 ✿</a>
    </nav>

    <div class="page-header">
        <h1>永遠18歲的媽媽/阿嬤/阿祖</h1>
        <p class="subtitle">陪伴日記・2026年1月－5月</p>
    </div>

    <div class="content">
        <div id="calendar"><div class="loading">載入中...</div></div>
    </div>

    <div class="photo-hover-preview" id="photoHoverPreview">
        <img id="hoverPreviewImg" src="" alt="">
    </div>

    <div class="photo-modal" id="photoModal" onclick="hideModal()">
        <span class="close-btn" id="closeModal">&times;</span>
        <span class="nav-btn prev" id="prevBtn" onclick="event.stopPropagation(); prevPhoto()">&#10094;</span>
        <img id="modalImg" src="" alt="" onclick="event.stopPropagation()">
        <span class="nav-btn next" id="nextBtn" onclick="event.stopPropagation(); nextPhoto()">&#10095;</span>
        <div class="photo-counter" id="photoCounter"></div>
    </div>

    <div class="text-modal" id="textModal">
        <span class="close-btn" id="closeTextModal">&times;</span>
        <div id="textModalContent" style="background:white;padding:20px;border-radius:12px;max-width:85%;max-height:70%;overflow:auto;font-size:16px;line-height:1.6;color:#333;"></div>
    </div>

    <script>
        const weekdays   = ['日','一','二','三','四','五','六'];
        const monthNames = ['1月','2月','3月','4月','5月'];
        const MONTHS     = ['01','02','03','04','05'];
        const currentYear = 2026;

        const holidays = {
            '2026-01-01': '元旦', '2026-01-02': '元旦(補)',
            '2026-02-16': '除夕', '2026-02-17': '春節',
            '2026-02-18': '春節', '2026-02-19': '春節',
            '2026-04-04': '兒童節', '2026-04-05': '清明節',
            '2026-05-01': '勞動節',
        };

        function getDateKey(y, m, d) {
            return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        }
        function isWeekend(y, m, d) {
            const w = new Date(y, m, d).getDay(); return w===0||w===6;
        }
        function isHoliday(y, m, d) { return holidays[getDateKey(y,m,d)] || null; }

        function renderMonth(monthIdx, bookings) {
            const year  = currentYear;
            const month = monthIdx;

            const section = document.createElement('div');
            section.className = 'month-section';
            section.id = `month-${String(monthIdx+1).padStart(2,'0')}`;

            const header = document.createElement('div');
            header.className = 'month-header';
            header.innerHTML = `<div class="month-header-line"></div>
                <div class="month-header-title">${year}年 ${monthNames[monthIdx]}</div>`;
            section.appendChild(header);

            const monthDiv = document.createElement('div');
            monthDiv.className = 'month';

            const wdDiv = document.createElement('div');
            wdDiv.className = 'weekdays';
            weekdays.forEach(w => {
                const d = document.createElement('div'); d.textContent = w; wdDiv.appendChild(d);
            });
            monthDiv.appendChild(wdDiv);

            const daysDiv = document.createElement('div');
            daysDiv.className = 'days';

            const firstDay    = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month+1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                const e = document.createElement('div'); e.className = 'day empty'; daysDiv.appendChild(e);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const isFinalDay   = (month===4 && day===3);
                const isAfterFinal = (month===4 && day>3);
                const dayDiv       = document.createElement('div');
                const dateKey      = getDateKey(year, month, day);
                const booking      = bookings[dateKey];
                const hasContent   = booking && (
                    (booking.morning&&booking.morning.trim())||
                    (booking.afternoon&&booking.afternoon.trim())||
                    (booking.note&&booking.note.trim())||
                    (booking.photos&&booking.photos.length>0)
                );

                if (isAfterFinal && !hasContent) {
                    dayDiv.className = 'day day-after';
                    const dn = document.createElement('div');
                    dn.className = 'date-num'; dn.textContent = day;
                    dayDiv.appendChild(dn);
                    daysDiv.appendChild(dayDiv);
                    continue;
                }

                dayDiv.className = 'day';
                if (isFinalDay) dayDiv.classList.add('day-final');
                if (isAfterFinal) dayDiv.classList.add('day-ceremony');

                const weekend     = isWeekend(year, month, day);
                const holidayName = isHoliday(year, month, day);
                if (!isFinalDay && (weekend||holidayName))
                    dayDiv.classList.add(weekend ? 'weekend' : 'holiday');

                const dateNum = document.createElement('div');
                dateNum.className = 'date-num'; dateNum.textContent = day;
                dayDiv.appendChild(dateNum);

                if (holidayName) {
                    const h = document.createElement('div');
                    h.className = 'holiday-name'; h.textContent = holidayName;
                    dayDiv.appendChild(h);
                }

                if (booking) {
                    const hasM    = booking.morning&&booking.morning.trim();
                    const hasA    = booking.afternoon&&booking.afternoon.trim();
                    const hasNote = booking.note&&booking.note.trim();

                    if (hasM||hasA) {
                        const vis = document.createElement('div');
                        vis.className = 'visitors';
                        if (hasM) {
                            const m = document.createElement('div');
                            m.className = 'morning'; m.textContent = booking.morning;
                            vis.appendChild(m);
                        }
                        if (hasA) {
                            const a = document.createElement('div');
                            a.className = 'afternoon'; a.textContent = booking.afternoon;
                            vis.appendChild(a);
                        }
                        dayDiv.appendChild(vis);
                    }

                    if (hasNote) {
                        const noteDiv = document.createElement('div');
                        noteDiv.className = 'note';
                        noteDiv.setAttribute('data-full', booking.note);
                        noteDiv.textContent = booking.note.length > 40
                            ? booking.note.substring(0,40)+'...' : booking.note;
                        noteDiv.onclick = () => showTextModal(booking.note);
                        dayDiv.appendChild(noteDiv);
                    }

                    if (booking.photos && booking.photos.length>0) {
                        const photosDiv = document.createElement('div');
                        photosDiv.className = 'photos';
                        booking.photos.forEach((photo, idx) => {
                            const img = document.createElement('img');
                            img.src = photo;
                            img.loading = 'lazy';
                            img.onmouseenter = (e) => showHoverPreview(photo, e);
                            img.onmousemove  = (e) => moveHoverPreview(e);
                            img.onmouseleave = ()  => hideHoverPreview();
                            img.onclick = () => showModal(photo, booking.photos, idx);
                            photosDiv.appendChild(img);
                        });
                        dayDiv.appendChild(photosDiv);
                    }
                }

                daysDiv.appendChild(dayDiv);
            }

            monthDiv.appendChild(daysDiv);
            section.appendChild(monthDiv);
            return section;
        }

        // Hover preview
        function showHoverPreview(src, e) {
            const p = document.getElementById('photoHoverPreview');
            document.getElementById('hoverPreviewImg').src = src;
            p.style.display = 'block';
            moveHoverPreview(e);
        }
        function moveHoverPreview(e) {
            const p = document.getElementById('photoHoverPreview');
            const r = p.getBoundingClientRect();
            p.style.left = Math.min(e.clientX+20, window.innerWidth -r.width -20)+'px';
            p.style.top  = Math.min(e.clientY+20, window.innerHeight-r.height-20)+'px';
        }
        function hideHoverPreview() { document.getElementById('photoHoverPreview').style.display='none'; }

        // Photo modal
        let modalPhotos=[], modalIndex=0;
        function showModal(src, photos, idx) {
            modalPhotos=photos; modalIndex=idx; updateModal();
            document.getElementById('photoModal').classList.add('active');
        }
        function updateModal() {
            document.getElementById('modalImg').src = modalPhotos[modalIndex];
            document.getElementById('photoCounter').textContent = `${modalIndex+1} / ${modalPhotos.length}`;
            document.getElementById('prevBtn').classList.toggle('hidden', modalIndex===0);
            document.getElementById('nextBtn').classList.toggle('hidden', modalIndex===modalPhotos.length-1);
        }
        function prevPhoto() { if(modalIndex>0){modalIndex--;updateModal();} }
        function nextPhoto() { if(modalIndex<modalPhotos.length-1){modalIndex++;updateModal();} }
        function hideModal() { document.getElementById('photoModal').classList.remove('active'); }
        let touchX=0;
        document.getElementById('photoModal').addEventListener('touchstart', e=>{touchX=e.touches[0].clientX;});
        document.getElementById('photoModal').addEventListener('touchend', e=>{
            const diff=touchX-e.changedTouches[0].clientX;
            if(Math.abs(diff)>50){diff>0?nextPhoto():prevPhoto();}
        });
        document.getElementById('closeModal').onclick = hideModal;

        // Text modal
        function showTextModal(text) {
            document.getElementById('textModalContent').textContent = text;
            document.getElementById('textModal').classList.add('active');
        }
        document.getElementById('closeTextModal').onclick = ()=>document.getElementById('textModal').classList.remove('active');
        document.getElementById('textModal').onclick = function(e){if(e.target===this)this.classList.remove('active');};

        // Load all months and render
        async function init() {
            const results = await Promise.all(
                MONTHS.map(m => fetch(`${m}-data.json`).then(r=>r.ok?r.json():{}).catch(()=>({})))
            );
            const allBookings = Object.assign({}, ...results);
            const container = document.getElementById('calendar');
            container.innerHTML = '';
            MONTHS.forEach((m, idx) => container.appendChild(renderMonth(idx, allBookings)));

            const hash  = window.location.hash;
            const param = new URLSearchParams(window.location.search).get('month');
            const target = hash  ? document.querySelector(hash)
                         : param ? document.getElementById(`month-${param}`)
                         : null;
            if (target) setTimeout(()=>target.scrollIntoView({behavior:'smooth'}), 100);
        }
        init();

        // Petals
        const COLORS = ['#f9c4cc','#f7d4d8','#fce4ec','#f8bbd0','#ffffff','#fddde6'];
        for (let i=0; i<14; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            const size=7+Math.random()*9, dur=8+Math.random()*12, delay=-(Math.random()*20);
            const drift=(Math.random()-0.5)*100, rot=120+Math.floor(Math.random()*300);
            p.style.cssText=[
                `left:${Math.random()*100}vw`,`top:0`,
                `width:${size}px`,`height:${size*0.75}px`,
                `background:${COLORS[Math.floor(Math.random()*COLORS.length)]}`,
                `--drift:${drift}px`,`--rot:${rot}deg`,
                `animation:fall ${dur}s ${delay}s linear infinite`,
            ].join(';');
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
