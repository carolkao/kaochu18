<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/kaochu18/favicon.ico" type="image/x-icon">
    <title>永遠18歲的媽媽/阿嬤/阿祖</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background: #fdf5f6;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            overflow-x: hidden;
        }

        /* --- Petals (subtle) --- */
        .petal {
            position: fixed;
            border-radius: 50% 0 50% 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
        }
        @keyframes fall {
            0%   { opacity: 0;   transform: translateY(-6vh)  rotate(0deg); }
            6%   { opacity: 0.7; }
            94%  { opacity: 0.4; }
            100% { opacity: 0;   transform: translateY(108vh) rotate(var(--rot)) translateX(var(--drift)); }
        }

        /* --- Page header --- */
        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }
        .back-btn {
            display: inline-block;
            padding: 8px 18px;
            background: #c87888;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .back-btn:hover { background: #b06070; }

        h1 {
            text-align: center;
            color: #5a3848;
            margin: 0 0 6px;
            letter-spacing: 2px;
            font-size: 26px;
            position: relative;
            z-index: 1;
        }
        .subtitle {
            text-align: center;
            color: #a07888;
            margin-bottom: 20px;
            font-size: 15px;
            position: relative;
            z-index: 1;
        }

        /* --- Calendar --- */
        .month {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 16px rgba(170, 110, 130, 0.1);
            position: relative;
            z-index: 1;
        }
        .month-title {
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 10px;
            color: #5a3848;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 14px;
            color: #b09898;
            margin-bottom: 5px;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .day {
            min-height: 180px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 16px;
            border-radius: 6px;
            background: #fdfafa;
        }
        .day.empty {
            background: transparent;
        }
        .day.weekend {
            background: #fef5f0;
        }
        .day.holiday {
            background: #fef5f0;
        }
        .day .date-num {
            font-weight: bold;
            margin-bottom: 2px;
            color: #5a3848;
        }
        .day .holiday-name {
            font-size: 12px;
            color: #c07040;
            font-weight: bold;
        }
        .day .visitors {
            font-size: 13px;
            color: #666;
            text-align: center;
            line-height: 1.3;
            word-break: break-all;
        }
        .day .visitors .morning,
        .day .visitors .afternoon {
            color: #1565c0;
        }
        .day .note {
            font-size: 12px;
            color: #9060a8;
            font-style: italic;
            position: relative;
            cursor: pointer;
        }
        .day .note:hover::after {
            content: attr(data-full);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 100%;
            background: #5a3848;
            color: white;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-style: normal;
            white-space: pre-wrap;
            width: 250px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .day .photos {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .day .photos img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .day .photos img:hover { transform: scale(1.05); }

        /* --- 5/3 final day --- */
        .day.day-final {
            background: linear-gradient(135deg, #fffdf0, #fef8e2);
            box-shadow: 0 0 0 1px rgba(210, 170, 80, 0.4),
                        0 0 18px rgba(210, 170, 80, 0.18);
            position: relative;
        }
        .day.day-final .date-num {
            color: #8a6820;
        }
        .day.day-final::after {
            content: '✿';
            position: absolute;
            top: 5px;
            right: 7px;
            font-size: 13px;
            color: #c8a050;
            opacity: 0.75;
            pointer-events: none;
        }

        /* --- Post-5/3 ceremony days --- */
        .day.day-ceremony {
            background: #fdf8ee;
            border: 1px solid rgba(210, 180, 100, 0.25);
        }
        .day.day-ceremony .date-num { color: #8a6820; }
        .day.day-ceremony .visitors .morning,
        .day.day-ceremony .visitors .afternoon { color: #a07828; }
        .day.day-ceremony .note { color: #a07828; }

        /* --- Days after 5/3 --- */
        .day.day-after {
            background: transparent;
        }
        .day.day-after .date-num {
            color: #ddd;
            font-weight: normal;
        }

        /* --- Misc --- */
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #a07888;
        }
        .error {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #c06060;
        }

        /* Photo hover preview */
        .photo-hover-preview {
            display: none;
            position: fixed;
            z-index: 500;
            background: white;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            pointer-events: none;
        }
        .photo-hover-preview img {
            max-width: 400px;
            max-height: 400px;
            border-radius: 4px;
        }

        /* Photo modal */
        .photo-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.88);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .photo-modal.active { display: flex; }
        .photo-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }
        .photo-modal .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            color: white;
            font-size: 36px;
            cursor: pointer;
        }
        .photo-modal .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: white;
            cursor: pointer;
            padding: 20px;
            user-select: none;
            opacity: 0.7;
        }
        .photo-modal .nav-btn:hover { opacity: 1; }
        .photo-modal .nav-btn.prev { left: 10px; }
        .photo-modal .nav-btn.next { right: 10px; }
        .photo-modal .nav-btn.hidden { display: none; }
        .photo-modal .photo-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 20px; }
            .subtitle { font-size: 13px; }
            .month { padding: 10px; }
            .weekdays { font-size: 12px; }
            .days { gap: 1px; }
            .day { min-height: 100px; padding: 4px; font-size: 12px; }
            .day .date-num { font-size: 13px; }
            .day .visitors { font-size: 10px; }
            .day .holiday-name { font-size: 10px; }
            .day .note { font-size: 10px; }
            .day .photos img { width: 35px; height: 35px; }
            .photo-hover-preview { display: none !important; }
            .day .note:hover::after { display: none !important; }
            .day.day-final::after { font-size: 11px; }
        }
        @media (max-width: 480px) {
            .day { min-height: 80px; padding: 2px; }
            .day .date-num { font-size: 12px; }
            .day .visitors { font-size: 9px; }
            .day .photos img { width: 28px; height: 28px; }
        }

        /* --- Month navigation --- */
        .month-nav {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
            position: relative;
            z-index: 1;
        }
        .month-nav a {
            display: inline-block;
            padding: 10px 28px;
            background: #c87888;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            transition: background 0.2s, transform 0.15s;
        }
        .month-nav a:hover {
            background: #b06070;
            transform: translateY(-2px);
        }
        .month-nav a.hidden { visibility: hidden; }
    </style>
</head>
<body>

    <div class="page-header">
        <a href="index.html" class="back-btn">&larr; 返回</a>
    </div>

    <h1>永遠18歲的媽媽/阿嬤/阿祖</h1>
    <p class="subtitle" id="subtitle">載入中...</p>

    <div id="calendar">
        <div class="loading">載入中...</div>
    </div>

    <div class="month-nav" id="monthNav"></div>

    <div class="photo-hover-preview" id="photoHoverPreview">
        <img id="hoverPreviewImg" src="" alt="">
    </div>

    <div class="photo-modal" id="photoModal" onclick="hideModal()">
        <span class="close-btn" id="closeModal">&times;</span>
        <span class="nav-btn prev" id="prevBtn" onclick="event.stopPropagation(); prevPhoto()">&#10094;</span>
        <img id="modalImg" src="" alt="" onclick="event.stopPropagation()">
        <span class="nav-btn next" id="nextBtn" onclick="event.stopPropagation(); nextPhoto()">&#10095;</span>
        <div class="photo-counter" id="photoCounter"></div>
    </div>

    <div class="photo-modal" id="textModal">
        <span class="close-btn" id="closeTextModal">&times;</span>
        <div id="textModalContent" style="background:white;padding:20px;border-radius:12px;max-width:85%;max-height:70%;overflow:auto;font-size:16px;line-height:1.6;color:#333;"></div>
    </div>

    <script>
        const weekdays  = ['日','一','二','三','四','五','六'];
        const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

        const urlParams   = new URLSearchParams(window.location.search);
        const monthParam  = urlParams.get('month') || '01';
        const currentMonth = parseInt(monthParam, 10) - 1; // 0-indexed
        const currentYear  = 2026;

        document.title = `永遠18歲的媽媽/阿嬤/阿祖 - ${currentYear}年${monthNames[currentMonth]}`;
        document.getElementById('subtitle').textContent = `${currentYear}年 ${monthNames[currentMonth]}`;

        // Month navigation (Jan=01 … May=05)
        const monthNum = parseInt(monthParam, 10);
        const nav = document.getElementById('monthNav');
        const prevNum = monthNum - 1;
        const nextNum = monthNum + 1;
        const prevLink = document.createElement('a');
        prevLink.textContent = '← 上個月';
        if (prevNum >= 1) {
            prevLink.href = `month-page.html?month=${String(prevNum).padStart(2,'0')}`;
        } else {
            prevLink.classList.add('hidden');
        }
        const nextLink = document.createElement('a');
        nextLink.textContent = '下個月 →';
        if (nextNum <= 5) {
            nextLink.href = `month-page.html?month=${String(nextNum).padStart(2,'0')}`;
        } else {
            nextLink.classList.add('hidden');
        }
        nav.appendChild(prevLink);
        nav.appendChild(nextLink);

        const holidays = {
            '2026-01-01': '元旦',
            '2026-01-02': '元旦(補)',
            '2026-02-16': '除夕',
            '2026-02-17': '春節',
            '2026-02-18': '春節',
            '2026-02-19': '春節',
            '2026-04-04': '兒童節',
            '2026-04-05': '清明節',
            '2026-05-01': '勞動節',
        };

        function isHoliday(year, month, day) {
            return holidays[getDateKey(year, month, day)] || null;
        }
        function isWeekend(year, month, day) {
            const d = new Date(year, month, day).getDay();
            return d === 0 || d === 6;
        }
        function getDateKey(year, month, day) {
            return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        }

        function renderCalendar(bookings) {
            const container = document.getElementById('calendar');
            container.innerHTML = '';

            const year  = currentYear;
            const month = currentMonth;

            const monthDiv = document.createElement('div');
            monthDiv.className = 'month';

            const title = document.createElement('div');
            title.className = 'month-title';
            title.textContent = `${year}年 ${monthNames[month]}`;
            monthDiv.appendChild(title);

            const weekdaysDiv = document.createElement('div');
            weekdaysDiv.className = 'weekdays';
            weekdays.forEach(w => {
                const wd = document.createElement('div');
                wd.textContent = w;
                weekdaysDiv.appendChild(wd);
            });
            monthDiv.appendChild(weekdaysDiv);

            const daysDiv = document.createElement('div');
            daysDiv.className = 'days';

            const firstDay    = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month+1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                daysDiv.appendChild(empty);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const isFinalDay   = (month === 4 && day === 3);
                const isAfterFinal = (month === 4 && day > 3);

                const dayDiv = document.createElement('div');
                const dateKey = getDateKey(year, month, day);
                const booking = bookings[dateKey];
                const hasContent = booking && (
                    (booking.morning   && booking.morning.trim()) ||
                    (booking.afternoon && booking.afternoon.trim()) ||
                    (booking.note      && booking.note.trim()) ||
                    (booking.photos    && booking.photos.length > 0)
                );

                // Days after 5/3 with no data: faded empty cell
                if (isAfterFinal && !hasContent) {
                    dayDiv.className = 'day day-after';
                    const dn = document.createElement('div');
                    dn.className = 'date-num';
                    dn.textContent = day;
                    dayDiv.appendChild(dn);
                    daysDiv.appendChild(dayDiv);
                    continue;
                }

                dayDiv.className = 'day';
                if (isFinalDay) dayDiv.classList.add('day-final');
                if (isAfterFinal) dayDiv.classList.add('day-ceremony');

                const weekend     = isWeekend(year, month, day);
                const holidayName = isHoliday(year, month, day);
                if (!isFinalDay) {
                    if (weekend || holidayName) dayDiv.classList.add(weekend ? 'weekend' : 'holiday');
                }

                const dateNum = document.createElement('div');
                dateNum.className = 'date-num';
                dateNum.textContent = day;
                dayDiv.appendChild(dateNum);

                if (holidayName) {
                    const hName = document.createElement('div');
                    hName.className = 'holiday-name';
                    hName.textContent = holidayName;
                    dayDiv.appendChild(hName);
                }

                if (booking) {
                    const hasM    = booking.morning   && booking.morning.trim();
                    const hasA    = booking.afternoon && booking.afternoon.trim();
                    const hasNote = booking.note      && booking.note.trim();

                    if (hasM || hasA) {
                        const visitors = document.createElement('div');
                        visitors.className = 'visitors';
                        if (hasM) {
                            const m = document.createElement('div');
                            m.className = 'morning';
                            m.textContent = booking.morning;
                            visitors.appendChild(m);
                        }
                        if (hasA) {
                            const a = document.createElement('div');
                            a.className = 'afternoon';
                            a.textContent = booking.afternoon;
                            visitors.appendChild(a);
                        }
                        dayDiv.appendChild(visitors);
                    }

                    if (hasNote) {
                        const noteDiv = document.createElement('div');
                        noteDiv.className = 'note';
                        noteDiv.setAttribute('data-full', booking.note);
                        noteDiv.textContent = booking.note.length > 40
                            ? booking.note.substring(0, 40) + '...'
                            : booking.note;
                        noteDiv.onclick = () => showTextModal(booking.note);
                        dayDiv.appendChild(noteDiv);
                    }

                    if (booking.photos && booking.photos.length > 0) {
                        const photosDiv = document.createElement('div');
                        photosDiv.className = 'photos';
                        booking.photos.forEach((photo, idx) => {
                            const img = document.createElement('img');
                            img.src = photo;
                            img.onmouseenter = (e) => showHoverPreview(photo, e);
                            img.onmousemove  = (e) => moveHoverPreview(e);
                            img.onmouseleave = ()  => hideHoverPreview();
                            img.onclick = () => showModal(photo, booking.photos, idx);
                            photosDiv.appendChild(img);
                        });
                        dayDiv.appendChild(photosDiv);
                    }
                }

                daysDiv.appendChild(dayDiv);
            }

            monthDiv.appendChild(daysDiv);
            container.appendChild(monthDiv);
        }

        // Hover preview
        function showHoverPreview(src, e) {
            const preview = document.getElementById('photoHoverPreview');
            document.getElementById('hoverPreviewImg').src = src;
            preview.style.display = 'block';
            moveHoverPreview(e);
        }
        function moveHoverPreview(e) {
            const preview = document.getElementById('photoHoverPreview');
            const rect = preview.getBoundingClientRect();
            preview.style.left = Math.min(e.clientX + 20, window.innerWidth  - rect.width  - 20) + 'px';
            preview.style.top  = Math.min(e.clientY + 20, window.innerHeight - rect.height - 20) + 'px';
        }
        function hideHoverPreview() {
            document.getElementById('photoHoverPreview').style.display = 'none';
        }

        // Photo modal
        let modalPhotos = [], modalIndex = 0;
        function showModal(src, photos, index) {
            modalPhotos = photos || [src];
            modalIndex  = index  || 0;
            updateModal();
            document.getElementById('photoModal').classList.add('active');
        }
        function updateModal() {
            document.getElementById('modalImg').src = modalPhotos[modalIndex];
            document.getElementById('photoCounter').textContent = `${modalIndex+1} / ${modalPhotos.length}`;
            document.getElementById('prevBtn').classList.toggle('hidden', modalIndex === 0);
            document.getElementById('nextBtn').classList.toggle('hidden', modalIndex === modalPhotos.length - 1);
        }
        function prevPhoto() { if (modalIndex > 0) { modalIndex--; updateModal(); } }
        function nextPhoto() { if (modalIndex < modalPhotos.length - 1) { modalIndex++; updateModal(); } }
        function hideModal() {
            document.getElementById('photoModal').classList.remove('active');
            modalPhotos = []; modalIndex = 0;
        }

        // Swipe
        let touchStartX = 0;
        document.getElementById('photoModal').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
        document.getElementById('photoModal').addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) { diff > 0 ? nextPhoto() : prevPhoto(); }
        });
        document.getElementById('closeModal').onclick = hideModal;

        // Text modal
        function showTextModal(text) {
            document.getElementById('textModalContent').textContent = text;
            document.getElementById('textModal').classList.add('active');
        }
        function hideTextModal() { document.getElementById('textModal').classList.remove('active'); }
        document.getElementById('closeTextModal').onclick = hideTextModal;
        document.getElementById('textModal').onclick = function(e) { if (e.target === this) hideTextModal(); };

        // Load data
        fetch(`${monthParam}-data.json`)
            .then(r => { if (!r.ok) throw new Error('無法載入資料'); return r.json(); })
            .then(data => renderCalendar(data))
            .catch(err => {
                // Even if no data file, still render the empty calendar
                renderCalendar({});
            });

        // Subtle petals
        const COLORS = ['#f9c4cc','#f7d4d8','#fce4ec','#f8bbd0','#ffffff','#fddde6'];
        for (let i = 0; i < 14; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            const size  = 7 + Math.random() * 9;
            const dur   = 8 + Math.random() * 12;
            const delay = -(Math.random() * 20);
            const drift = (Math.random() - 0.5) * 100;
            const rot   = 120 + Math.floor(Math.random() * 300);
            p.style.cssText = [
                `left: ${Math.random() * 100}vw`,
                `top: 0`,
                `width: ${size}px`,
                `height: ${size * 0.75}px`,
                `background: ${COLORS[Math.floor(Math.random() * COLORS.length)]}`,
                `--drift: ${drift}px`,
                `--rot: ${rot}deg`,
                `animation: fall ${dur}s ${delay}s linear infinite`,
            ].join(';');
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
